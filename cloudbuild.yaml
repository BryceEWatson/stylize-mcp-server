steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA',
      '.'
    ]

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
    ]

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', '${_SERVICE_NAME}',
      '--image', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA',
      '--region', '${_REGION}',
      '--platform', 'managed',
      '--service-account', 'stylize-mcp-sa@${PROJECT_ID}.iam.gserviceaccount.com',
      # VPC connector removed to reduce costs during development
      # '--vpc-connector', 'projects/${PROJECT_ID}/locations/${_REGION}/connectors/stylize-mcp-vpc-connector',
      '--allow-unauthenticated',
      '--set-env-vars', '^##^GCP_PROJECT_ID=${PROJECT_ID}##OPENAI_API_KEY_SECRET_PATH=${_OPENAI_API_KEY_SECRET_PATH}'
    ]

substitutions:
  _REGION: us-central1  # Default region
  _ARTIFACT_REPO_NAME: stylize-repo  # Default Artifact Registry repository name
  _SERVICE_NAME: stylize-mcp-server  # Default Cloud Run service name
  # Redis-related substitutions removed to reduce costs during development
  # _REDIS_HOST: REDIS_HOST_TO_BE_PROVIDED  # Placeholder for Redis host
  # _REDIS_PORT: REDIS_PORT_TO_BE_PROVIDED  # Placeholder for Redis port
  _OPENAI_API_KEY_SECRET_PATH: OPENAI_API_KEY_SECRET_PATH_TO_BE_PROVIDED  # Placeholder for OpenAI API key secret path

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
