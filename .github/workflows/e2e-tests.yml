name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/e2e/**'
      - 'requirements*.txt'
      - 'docker-compose*.yml'
      - 'Dockerfile*'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - trial_journey
          - mcp_integration
          - credit_system
          - cross_interface
          - error_scenarios
          - security
          - performance
      browser:
        description: 'Browser for web UI tests'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - both
      environment:
        description: 'Test environment'
        required: false
        default: 'local'
        type: choice
        options:
          - local
          - staging

env:
  # Test configuration
  E2E_ENVIRONMENT: ${{ github.event.inputs.environment || 'local' }}
  E2E_BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
  E2E_HEADLESS: true
  E2E_PARALLEL_TESTS: true
  E2E_MAX_RETRIES: 2
  E2E_TEST_TIMEOUT: 300
  
  # Security
  E2E_TEST_SECURITY: true
  E2E_RATE_LIMIT_TEST: true
  
  # OpenAI quota for E2E tests (limited)
  E2E_OPENAI_QUOTA_LIMIT: 10

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      test-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set test matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.test_suite }}" = "all" ] || [ -z "${{ github.event.inputs.test_suite }}" ]; then
            echo 'matrix=["trial_journey", "mcp_integration", "credit_system", "cross_interface", "error_scenarios"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.test_suite }}"]' >> $GITHUB_OUTPUT
          fi

  e2e-tests:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        test-suite: ${{ fromJson(needs.prepare.outputs.test-matrix) }}
        browser: ${{ github.event.inputs.browser == 'both' && fromJson('["chrome", "firefox"]') || fromJson(format('["{0}"]', github.event.inputs.browser || 'chrome')) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create fake credentials for testing
        run: |
          echo '${{ secrets.FAKE_GCP_CREDENTIALS || '{}' }}' > fake-credentials.json

      - name: Start services
        run: |
          # Start infrastructure services
          docker-compose -f docker-compose.e2e.yml up -d firestore-emulator gcs-emulator redis
          
          # Wait for services to be ready
          timeout=60
          while [ $timeout -gt 0 ]; do
            if curl -f http://localhost:8081 >/dev/null 2>&1 && \
               curl -f http://localhost:4443/storage/v1/b >/dev/null 2>&1 && \
               redis-cli -h localhost ping >/dev/null 2>&1; then
              echo "Services are ready"
              break
            fi
            sleep 2
            timeout=$((timeout - 2))
          done
          
          if [ $timeout -eq 0 ]; then
            echo "Services failed to start within timeout"
            exit 1
          fi

      - name: Start Selenium
        run: |
          if [ "${{ matrix.browser }}" = "firefox" ]; then
            docker-compose -f docker-compose.e2e.yml up -d selenium-firefox
            export E2E_SELENIUM_HUB_URL=http://localhost:4445/wd/hub
          else
            docker-compose -f docker-compose.e2e.yml up -d selenium-chrome
            export E2E_SELENIUM_HUB_URL=http://localhost:4444/wd/hub
          fi
          
          # Wait for Selenium
          timeout=60
          while [ $timeout -gt 0 ]; do
            if curl -f $E2E_SELENIUM_HUB_URL/status >/dev/null 2>&1; then
              echo "Selenium is ready"
              break
            fi
            sleep 2
            timeout=$((timeout - 2))
          done

      - name: Start application
        env:
          E2E_OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
        run: |
          # Build and start the application
          docker-compose -f docker-compose.e2e.yml up -d app
          
          # Wait for application to be ready
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -f http://localhost:8080/health >/dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            sleep 3
            timeout=$((timeout - 3))
          done
          
          if [ $timeout -eq 0 ]; then
            echo "Application failed to start"
            docker-compose -f docker-compose.e2e.yml logs app
            exit 1
          fi

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_BROWSER: ${{ matrix.browser }}
          E2E_SELENIUM_GRID: true
          E2E_SELENIUM_HUB_URL: ${{ matrix.browser == 'firefox' && 'http://localhost:4445/wd/hub' || 'http://localhost:4444/wd/hub' }}
          E2E_TEST_API_KEY: e2e-test-key-12345
          E2E_OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
        run: |
          # Create reports directory
          mkdir -p tests/e2e/reports
          
          # Determine test file based on suite
          case "${{ matrix.test-suite }}" in
            trial_journey)
              TEST_FILE="tests/e2e/test_trial_user_journey.py"
              ;;
            mcp_integration)
              TEST_FILE="tests/e2e/test_mcp_ai_integration.py"
              ;;
            credit_system)
              TEST_FILE="tests/e2e/test_credit_system.py"
              ;;
            cross_interface)
              TEST_FILE="tests/e2e/test_cross_interface_integration.py"
              ;;
            error_scenarios)
              TEST_FILE="tests/e2e/test_error_scenarios.py"
              ;;
            security)
              TEST_FILE="tests/e2e/test_security_features.py"
              ;;
            performance)
              TEST_FILE="tests/e2e/test_performance.py"
              ;;
            *)
              TEST_FILE="tests/e2e/"
              ;;
          esac
          
          # Run tests with retry
          for attempt in 1 2 3; do
            echo "Test attempt $attempt"
            
            python -m pytest $TEST_FILE \
              -v \
              --tb=short \
              --maxfail=5 \
              --timeout=300 \
              --html=tests/e2e/reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}-attempt${attempt}.html \
              --self-contained-html \
              --json-report \
              --json-report-file=tests/e2e/reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}-attempt${attempt}.json \
              -m "not slow" \
              && break || {
                echo "Attempt $attempt failed"
                if [ $attempt -eq 3 ]; then
                  echo "All attempts failed"
                  exit 1
                fi
                sleep 10
              }
          done

      - name: Collect service logs on failure
        if: failure()
        run: |
          echo "=== Application logs ==="
          docker-compose -f docker-compose.e2e.yml logs app
          
          echo "=== Firestore emulator logs ==="
          docker-compose -f docker-compose.e2e.yml logs firestore-emulator
          
          echo "=== Selenium logs ==="
          if [ "${{ matrix.browser }}" = "firefox" ]; then
            docker-compose -f docker-compose.e2e.yml logs selenium-firefox
          else
            docker-compose -f docker-compose.e2e.yml logs selenium-chrome
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-reports-${{ matrix.test-suite }}-${{ matrix.browser }}
          path: tests/e2e/reports/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: screenshots-${{ matrix.test-suite }}-${{ matrix.browser }}
          path: tests/e2e/screenshots/
          retention-days: 7

      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.e2e.yml down -v
          docker system prune -f

  security-tests:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'security' || github.event.inputs.test_suite == ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Start services for security testing
        run: |
          docker-compose -f docker-compose.e2e.yml up -d firestore-emulator gcs-emulator redis app
          
          # Wait for application
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -f http://localhost:8080/health >/dev/null 2>&1; then
              break
            fi
            sleep 3
            timeout=$((timeout - 3))
          done

      - name: Run security tests
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_TEST_SECURITY: true
          E2E_RATE_LIMIT_TEST: true
          E2E_TEST_API_KEY: e2e-test-key-12345
        run: |
          python -m pytest tests/e2e/test_security_features.py \
            -v \
            --tb=short \
            --html=tests/e2e/reports/security-report.html \
            --self-contained-html \
            -m "security"

      - name: Upload security test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-reports
          path: tests/e2e/reports/security-report.html
          retention-days: 30

      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.e2e.yml down -v

  performance-tests:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_suite == 'performance'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-e2e.txt

      - name: Start services for performance testing
        run: |
          docker-compose -f docker-compose.e2e.yml up -d firestore-emulator gcs-emulator redis app
          
          # Wait for application
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -f http://localhost:8080/health >/dev/null 2>&1; then
              break
            fi
            sleep 3
            timeout=$((timeout - 3))
          done

      - name: Run performance tests
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_CONCURRENT_USERS: 5
          E2E_MAX_RESPONSE_TIME: 30
          E2E_TEST_API_KEY: e2e-test-key-12345
          E2E_OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
        run: |
          python -m pytest tests/e2e/test_performance.py \
            -v \
            --tb=short \
            --html=tests/e2e/reports/performance-report.html \
            --self-contained-html \
            -m "performance"

      - name: Upload performance test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-reports
          path: tests/e2e/reports/performance-report.html
          retention-days: 30

      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.e2e.yml down -v

  summary:
    runs-on: ubuntu-latest
    needs: [e2e-tests, security-tests, performance-tests]
    if: always()
    steps:
      - name: Download all test reports
        uses: actions/download-artifact@v3
        with:
          path: all-reports

      - name: Generate test summary
        run: |
          echo "# E2E Test Results Summary" > test-summary.md
          echo "" >> test-summary.md
          echo "## Test Run Information" >> test-summary.md
          echo "- **Triggered by:** ${{ github.event_name }}" >> test-summary.md
          echo "- **Branch:** ${{ github.ref_name }}" >> test-summary.md
          echo "- **Commit:** ${{ github.sha }}" >> test-summary.md
          echo "- **Test Suite:** ${{ github.event.inputs.test_suite || 'all' }}" >> test-summary.md
          echo "- **Browser:** ${{ github.event.inputs.browser || 'chrome' }}" >> test-summary.md
          echo "" >> test-summary.md
          
          echo "## Job Results" >> test-summary.md
          echo "- **E2E Tests:** ${{ needs.e2e-tests.result }}" >> test-summary.md
          echo "- **Security Tests:** ${{ needs.security-tests.result }}" >> test-summary.md
          echo "- **Performance Tests:** ${{ needs.performance-tests.result }}" >> test-summary.md
          echo "" >> test-summary.md
          
          # List all available reports
          echo "## Available Reports" >> test-summary.md
          find all-reports -name "*.html" -o -name "*.json" | while read report; do
            echo "- $report" >> test-summary.md
          done

      - name: Upload test summary
        uses: actions/upload-artifact@v3
        with:
          name: test-summary
          path: test-summary.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail if any job failed
        if: needs.e2e-tests.result == 'failure' || needs.security-tests.result == 'failure' || needs.performance-tests.result == 'failure'
        run: exit 1