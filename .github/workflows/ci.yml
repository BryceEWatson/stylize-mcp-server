name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-xdist coverage[toml]

    - name: Run linting with ruff
      run: |
        pip install ruff
        ruff check app/ tests/ --output-format=github

    - name: Run tests with coverage
      env:
        OPENAI_API_KEY: fake_test_key
        GCP_PROJECT_ID: test-project
        AUTH_DEV_BYPASS: true
        DEV_API_KEY: test-dev-key
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-report=html -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: stylize-mcp-server:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm -d --name test-container \
          -e OPENAI_API_KEY=fake_test_key \
          -e GCP_PROJECT_ID=test-project \
          -e AUTH_DEV_BYPASS=true \
          -e DEV_API_KEY=test-dev-key \
          -p 8080:8080 stylize-mcp-server:latest
        
        # Wait for container to start
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:8080/health || exit 1
        
        # Clean up
        docker stop test-container

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [test, docker]
    # Only run E2E tests when explicitly requested via PR label
    if: contains(github.event.pull_request.labels.*.name, 'run-e2e')
    
    strategy:
      fail-fast: false
      matrix:
        test-suite: ["trial_journey", "mcp_integration", "cross_interface"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install E2E dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-e2e.txt

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create fake credentials
      run: echo '{}' > fake-credentials.json

    - name: Start test services
      run: |
        docker-compose -f docker-compose.e2e.yml up -d firestore-emulator gcs-emulator redis selenium-chrome
        
        # Wait for services
        timeout=60
        while [ $timeout -gt 0 ]; do
          if curl -f http://localhost:8081 >/dev/null 2>&1 && \
             curl -f http://localhost:4443/storage/v1/b >/dev/null 2>&1 && \
             curl -f http://localhost:4444/wd/hub/status >/dev/null 2>&1; then
            echo "Services ready"
            break
          fi
          sleep 2
          timeout=$((timeout - 2))
        done

    - name: Start application
      run: |
        docker-compose -f docker-compose.e2e.yml up -d app
        
        # Wait for app
        timeout=60
        while [ $timeout -gt 0 ]; do
          if curl -f http://localhost:8080/health >/dev/null 2>&1; then
            echo "Application ready"
            break
          fi
          sleep 2
          timeout=$((timeout - 2))
        done

    - name: Run E2E tests
      env:
        E2E_BASE_URL: http://localhost:8080
        E2E_BROWSER: chrome
        E2E_HEADLESS: true
        E2E_SELENIUM_GRID: true
        E2E_SELENIUM_HUB_URL: http://localhost:4444/wd/hub
        E2E_TEST_API_KEY: e2e-test-key-12345
      run: |
        TEST_FILE="tests/e2e/test_${{ matrix.test-suite }}.py"
        if [ "${{ matrix.test-suite }}" = "trial_journey" ]; then
          TEST_FILE="tests/e2e/test_trial_user_journey.py"
        elif [ "${{ matrix.test-suite }}" = "mcp_integration" ]; then
          TEST_FILE="tests/e2e/test_mcp_ai_integration.py"
        elif [ "${{ matrix.test-suite }}" = "cross_interface" ]; then
          TEST_FILE="tests/e2e/test_cross_interface_integration.py"
        fi
        
        pytest $TEST_FILE -v --tb=short -m "not slow" \
          --html=tests/e2e/reports/report-${{ matrix.test-suite }}.html \
          --self-contained-html

    - name: Upload E2E test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-reports-${{ matrix.test-suite }}
        path: tests/e2e/reports/
        retention-days: 7

    - name: Clean up
      if: always()
      run: docker-compose -f docker-compose.e2e.yml down -v